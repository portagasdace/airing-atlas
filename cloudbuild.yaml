substitutions:
  _FIREBASE_PROJECT_ID: airing-atlas
  _PUBLIC_SITE_URL: "https://airingatlas.com"
  _PUBLIC_GA_MEASUREMENT_ID: "G-MBDVYCF406"

steps:
  - name: node:22
    entrypoint: bash
    args: ["-lc", "corepack enable && pnpm install --frozen-lockfile"]
  - name: node:22
    entrypoint: bash
    args: ["-lc", "corepack enable && pnpm run sync"]
    env:
      - "PUBLIC_SITE_URL=${_PUBLIC_SITE_URL}"
      - "PUBLIC_GA_MEASUREMENT_ID=${_PUBLIC_GA_MEASUREMENT_ID}"
  - name: node:22
    entrypoint: bash
    args: ["-lc", "corepack enable && pnpm run build"]
    env:
      - "PUBLIC_SITE_URL=${_PUBLIC_SITE_URL}"
      - "PUBLIC_GA_MEASUREMENT_ID=${_PUBLIC_GA_MEASUREMENT_ID}"
  - name: node:22
    entrypoint: bash
    args:
      - "-lc"
      - "corepack enable && pnpm dlx firebase-tools deploy --only hosting --project ${_FIREBASE_PROJECT_ID}"

options:
  logging: CLOUD_LOGGING_ONLY
